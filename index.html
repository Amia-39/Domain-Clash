<!DOCTYPE html>
<html>
<head>
  <title>Hand Tracking + Gestures</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

   video, canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
}

video {
  z-index: 1;
}

canvas {
  z-index: 2;
  pointer-events: none;
}
    video.mirror, canvas.mirror {
      transform: scaleX(-1);
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
    }
  </style>
</head>
<body>

<button id="flip">Flip Camera</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const flipBtn = document.getElementById('flip');

let currentStream = null;
let facingMode = "user";
let animationId = null;

// =====================
// MediaPipe setup
// =====================
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

// =====================
// Helpers
// =====================
function isFingerExtended(tip, pip, landmarks) {
  return landmarks[tip].y < landmarks[pip].y;
}

function isThumbExtended(landmarks, handedness) {
  const tip = landmarks[4];
  const ip = landmarks[3];

  if (handedness === "Right") {
    return tip.x < ip.x;
  } else {
    return tip.x > ip.x;
  }
}

function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// =====================
// Gestures
// =====================

function isThumbsUp(landmarks) {
  const thumbUp = landmarks[4].y < landmarks[3].y;

  const indexFolded = landmarks[8].y > landmarks[6].y;
  const middleFolded = landmarks[12].y > landmarks[10].y;
  const ringFolded = landmarks[16].y > landmarks[14].y;
  const pinkyFolded = landmarks[20].y > landmarks[18].y;

  return thumbUp && indexFolded && middleFolded && ringFolded && pinkyFolded;
}

function isFingersCrossed(landmarks, handedness) {
  const thumb = isThumbExtended(landmarks, handedness);
  const index = isFingerExtended(8, 6, landmarks);
  const middle = isFingerExtended(12, 10, landmarks);
  const ring = isFingerExtended(16, 14, landmarks);
  const pinky = isFingerExtended(20, 18, landmarks);

  if (!(index && middle && !ring && !pinky)) return false;
  if (thumb) return false;

  const indexTip = landmarks[8];
  const middleTip = landmarks[12];

  const dist = distance(indexTip, middleTip);

  const CLOSE_THRESHOLD = 0.05;

  const crossedDirection =
    (indexTip.y > landmarks[10].y && middleTip.y < landmarks[6].y) ||
    (middleTip.y > landmarks[6].y && indexTip.y < landmarks[10].y);

  return dist < CLOSE_THRESHOLD && crossedDirection;
}

function getRPSGesture(landmarks, handedness) {
  const thumb = isThumbExtended(landmarks, handedness);
  const index = isFingerExtended(8, 6, landmarks);
  const middle = isFingerExtended(12, 10, landmarks);
  const ring = isFingerExtended(16, 14, landmarks);
  const pinky = isFingerExtended(20, 18, landmarks);

  if (!thumb && !index && !middle && !ring && !pinky) return "rock";
  if (thumb && index && middle && ring && pinky) return "paper";
  if (!thumb && index && middle && !ring && !pinky) return "scissors";

  return null;
}

// =====================
// Main processing
// =====================
hands.onResults((results) => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);


  if (results.multiHandLandmarks && results.multiHandedness) {
    const landmarks = results.multiHandLandmarks[0];
    const handedness = results.multiHandedness[0].label;

    drawConnectors(ctx, landmarks, HAND_CONNECTIONS);
    drawLandmarks(ctx, landmarks);

    let gesture = null;

    // Priority order matters
    if (isThumbsUp(landmarks)) {
      gesture = "thumbs up";
    } else if (isFingersCrossed(landmarks, handedness)) {
      gesture = "crossed";
    } else {
      gesture = getRPSGesture(landmarks, handedness);
    }

    if (gesture) {
      ctx.fillStyle = "yellow";
      ctx.font = "40px Arial";
      ctx.fillText(gesture.toUpperCase(), 20, 50);

      console.log(gesture);
    }
  }
});

// =====================
// Camera + loop
// =====================
let processingFrame = false;

async function processFrame() {

  // Skip if MediaPipe still busy
  if (!processingFrame) {
    processingFrame = true;

    try {
      await hands.send({ image: video });
    } catch (err) {
      console.error(err);
    }

    processingFrame = false;
  }

  animationId = requestAnimationFrame(processFrame);
}

async function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;

    if (facingMode === "user") {
      video.classList.add("mirror");
      canvas.classList.add("mirror");
    } else {
      video.classList.remove("mirror");
      canvas.classList.remove("mirror");
    }

    await video.play();
    processFrame();

  } catch (err) {
    console.error("Camera error:", err);
  }
}

// =====================
// Flip button
// =====================
flipBtn.addEventListener('click', () => {
  facingMode = (facingMode === "user") ? "environment" : "user";
  startCamera();
});

// Start
startCamera();
</script>

</body>
</html>
