<!DOCTYPE html>
<html>
<head>
  <title>Camera + Hand Tracking</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
    }

    video.mirror, canvas.mirror {
      transform: scaleX(-1);
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
    }
  </style>
</head>
<body>

  <button id="flip">Flip Camera</button>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const flipBtn = document.getElementById('flip');

    let currentStream = null;
    let facingMode = "user";

    // Setup MediaPipe
    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(ctx, landmarks, HAND_CONNECTIONS);
          drawLandmarks(ctx, landmarks);
        }
      }

      if (results.multiHandLandmarks && results.multiHandedness) {
  for (let i = 0; i < results.multiHandLandmarks.length; i++) {
    const landmarks = results.multiHandLandmarks[i];
    const handedness = results.multiHandedness[i].label;

    drawConnectors(ctx, landmarks, HAND_CONNECTIONS);
    drawLandmarks(ctx, landmarks);

    const gesture = getGesture(landmarks, handedness);

    if (gesture) {
      console.log(gesture);

      ctx.fillStyle = "yellow";
      ctx.font = "40px Arial";
      ctx.fillText(gesture.toUpperCase(), 20, 50);
    }
  }
}
      
    });

    async function startCamera() {
  // Stop previous stream
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  // 🚨 Stop previous animation loop
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;

    // Mirror front camera
    if (facingMode === "user") {
      video.classList.add("mirror");
      canvas.classList.add("mirror");
    } else {
      video.classList.remove("mirror");
      canvas.classList.remove("mirror");
    }

    await video.play();

    // ✅ Start fresh loop
    processFrame();

  } catch (err) {
    console.error("Camera error:", err);
  }
}

    let animationId = null;

  async function processFrame() {
  await hands.send({ image: video });
  animationId = requestAnimationFrame(processFrame);
}

    function isFingerExtended(tip, pip, landmarks) {
  return landmarks[tip].y < landmarks[pip].y;
}

    function isThumbExtended(landmarks, handedness) {
  const thumbTip = landmarks[4];
  const thumbIP = landmarks[3];

  if (handedness === "Right") {
    return thumbTip.x < thumbIP.x;
  } else {
    return thumbTip.x > thumbIP.x;
  }
}

    function isFingersCrossed(landmarks, handedness) {
  const thumb = isThumbExtended(landmarks, handedness);
  const index = isFingerExtended(8, 6, landmarks);
  const middle = isFingerExtended(12, 10, landmarks);
  const ring = isFingerExtended(16, 14, landmarks);
  const pinky = isFingerExtended(20, 18, landmarks);

  // Basic shape: only index + middle up
  if (!(index && middle && !ring && !pinky)) {
    return false;
  }

  // Optional: thumb tucked for stricter detection
  if (thumb) {
    return false;
  }

  // 🔀 Check if index & middle are "crossed"
  const indexTip = landmarks[8];
  const middleTip = landmarks[12];

  const dist = distance(indexTip, middleTip);

  // Threshold — tweak this if needed
  const CLOSE_THRESHOLD = 0.05;

  return dist < CLOSE_THRESHOLD;
}

    function getGesture(landmarks, handedness) {
  const thumb = isThumbExtended(landmarks, handedness);
  const index = isFingerExtended(8, 6, landmarks);
  const middle = isFingerExtended(12, 10, landmarks);
  const ring = isFingerExtended(16, 14, landmarks);
  const pinky = isFingerExtended(20, 18, landmarks);
const gesture = isFingersCrossed(landmarks, handedness)
  ? "crossed"
  : getGesture(landmarks, handedness);
      
  // Rock ✊
  if (!thumb && !index && !middle && !ring && !pinky) {
    return "rock";
  }

  // Paper ✋
  if (thumb && index && middle && ring && pinky) {
    return "paper";
  }

  // Scissors ✌️
  if (!thumb && index && middle && !ring && !pinky) {
    return "scissors";
  }

  return null;
}

    function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}
    
    flipBtn.addEventListener('click', () => {
      facingMode = (facingMode === "user") ? "environment" : "user";
      startCamera();
    });

    startCamera();
  </script>

</body>
</html>
