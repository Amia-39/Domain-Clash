<!DOCTYPE html>
<html>
<head>
  <title>Hand Tracking + Gestures</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video,
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
    }

    video {
      z-index: 1;
    }

    canvas {
      z-index: 2;
      pointer-events: none;
    }

    video.mirror,
    canvas.mirror {
      transform: scaleX(-1);
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px 14px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<button id="flip">Flip Camera</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const flipBtn = document.getElementById("flip");

let currentStream = null;
let facingMode = "user";

let animationId = null;
let processingFrame = false;

// ======================
// MediaPipe setup
// ======================

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

// ======================
// Helpers
// ======================

function isFingerExtended(tip, pip, landmarks) {
  return landmarks[tip].y < landmarks[pip].y;
}

function isThumbExtended(landmarks, handedness) {
  const tip = landmarks[4];
  const ip = landmarks[3];

  if (handedness === "Right") {
    return tip.x < ip.x;
  } else {
    return tip.x > ip.x;
  }
}

function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ======================
// Gestures
// ======================

function isFingersCrossed(landmarks) {

  const indexTip = landmarks[8];
  const middleTip = landmarks[12];

  const indexBase = landmarks[5];
  const middleBase = landmarks[9];

  // -------------------------
  // Tips close together
  // -------------------------

  const tipDistance = distance(
    indexTip,
    middleTip
  );

  // -------------------------
  // Bases separated
  // -------------------------

  const baseDistance = distance(
    indexBase,
    middleBase
  );

  // -------------------------
  // Fingers overlap horizontally
  // -------------------------

  const crossedHorizontally =
    (indexTip.x > middleTip.x &&
     indexBase.x < middleBase.x)
    ||
    (indexTip.x < middleTip.x &&
     indexBase.x > middleBase.x);

  // -------------------------
  // Depth difference
  // -------------------------

  const depthDifference =
    Math.abs(indexTip.z - middleTip.z);

  return (
    tipDistance < 0.09 &&
    baseDistance > 0.03 &&
    crossedHorizontally &&
    depthDifference > 0.01
  );
}

function isFingersCrossed(landmarks, handedness) {

  const thumb =
    isThumbExtended(landmarks, handedness);

  const index =
    isFingerExtended(8, 6, landmarks);

  const middle =
    isFingerExtended(12, 10, landmarks);

  const ring =
    isFingerExtended(16, 14, landmarks);

  const pinky =
    isFingerExtended(20, 18, landmarks);

  // Only index + middle extended
  if (!(index && middle && !ring && !pinky)) {
    return false;
  }

  // Thumb tucked
  if (thumb) {
    return false;
  }

  const indexTip = landmarks[8];
  const middleTip = landmarks[12];

  const dist = distance(indexTip, middleTip);

  const CLOSE_THRESHOLD = 0.05;

  const crossedDirection =
    (indexTip.y > landmarks[10].y &&
     middleTip.y < landmarks[6].y)
    ||
    (middleTip.y > landmarks[6].y &&
     indexTip.y < landmarks[10].y);

  return (
    dist < CLOSE_THRESHOLD &&
    crossedDirection
  );
}


// ======================
// Drawing + detection
// ======================

hands.onResults((results) => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  if (
    results.multiHandLandmarks &&
    results.multiHandedness &&
    results.multiHandLandmarks.length > 0
  ) {

    const landmarks =
      results.multiHandLandmarks[0];

    const handedness =
      results.multiHandedness[0].label;

    // Draw hand skeleton
    drawConnectors(
      ctx,
      landmarks,
      HAND_CONNECTIONS
    );

    drawLandmarks(
      ctx,
      landmarks
    );

    // Detect crossed fingers only
    const crossed =
      isFingersCrossed(
        landmarks,
        handedness
      );

    if (crossed) {

      ctx.fillStyle = "yellow";
      ctx.font = "40px Arial";

      ctx.fillText(
        "CROSSED",
        20,
        50
      );

      console.log("crossed");
    }
  }
});
// ======================
// Stable processing loop
// ======================

async function processFrame() {

  animationId =
    requestAnimationFrame(processFrame);

  // Wait until video ready
  if (video.readyState < 2) {
    return;
  }

  // Prevent overlapping inference
  if (processingFrame) {
    return;
  }

  processingFrame = true;

  try {

    await hands.send({
      image: video
    });

  } catch (err) {

    console.error(
      "MediaPipe error:",
      err
    );

  } finally {

    // ALWAYS unlock
    processingFrame = false;
  }
}

// ======================
// Camera setup
// ======================

async function startCamera() {

  // Stop previous stream
  if (currentStream) {

    currentStream
      .getTracks()
      .forEach(track => track.stop());
  }

  // Stop previous loop
  if (animationId) {

    cancelAnimationFrame(animationId);
    animationId = null;
  }

  processingFrame = false;

  try {

    const stream =
      await navigator.mediaDevices
      .getUserMedia({
        video: {
          facingMode: facingMode
        },
        audio: false
      });

    currentStream = stream;

    video.srcObject = stream;

    // Mirror selfie camera
    if (facingMode === "user") {

      video.classList.add("mirror");
      canvas.classList.add("mirror");

    } else {

      video.classList.remove("mirror");
      canvas.classList.remove("mirror");
    }

    await video.play();

    processFrame();

  } catch (err) {

    console.error(
      "Camera error:",
      err
    );
  }
}

// ======================
// Flip camera
// ======================

flipBtn.addEventListener("click", () => {

  facingMode =
    facingMode === "user"
      ? "environment"
      : "user";

  startCamera();
});

// ======================
// Start app
// ======================

startCamera();

</script>

</body>
</html>
