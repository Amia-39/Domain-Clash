<!DOCTYPE html>
<html>
<head>
  <title>Camera + Hand Tracking</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
    }

    video.mirror, canvas.mirror {
      transform: scaleX(-1);
    }

    button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
    }
  </style>
</head>
<body>

  <button id="flip">Flip Camera</button>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const flipBtn = document.getElementById('flip');

    let currentStream = null;
    let facingMode = "user";

    // Setup MediaPipe
    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(ctx, landmarks, HAND_CONNECTIONS);
          drawLandmarks(ctx, landmarks);
        }
      }

      if (results.multiHandLandmarks) {
  for (const landmarks of results.multiHandLandmarks) {

    drawConnectors(ctx, landmarks, HAND_CONNECTIONS);
    drawLandmarks(ctx, landmarks);

    if (isThumbsUp(landmarks)) {
      console.log("👍 Thumbs up detected!");
      
      // Example visual feedback
      ctx.fillStyle = "lime";
      ctx.font = "40px Arial";
      ctx.fillText("👍", 20, 50);
    }
  }
}

      
    });

    async function startCamera() {
  // Stop previous stream
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  // 🚨 Stop previous animation loop
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;

    // Mirror front camera
    if (facingMode === "user") {
      video.classList.add("mirror");
      canvas.classList.add("mirror");
    } else {
      video.classList.remove("mirror");
      canvas.classList.remove("mirror");
    }

    await video.play();

    // ✅ Start fresh loop
    processFrame();

  } catch (err) {
    console.error("Camera error:", err);
  }
}

    let animationId = null;

  async function processFrame() {
  await hands.send({ image: video });
  animationId = requestAnimationFrame(processFrame);
}

    function isThumbsUp(landmarks) {
  // Thumb (vertical check)
  const thumbTip = landmarks[4];
  const thumbIP = landmarks[3];

  const thumbUp = thumbTip.y < thumbIP.y; // higher on screen

  // Other fingers (folded)
  const indexFolded = landmarks[8].y > landmarks[6].y;
  const middleFolded = landmarks[12].y > landmarks[10].y;
  const ringFolded = landmarks[16].y > landmarks[14].y;
  const pinkyFolded = landmarks[20].y > landmarks[18].y;

  return thumbUp && indexFolded && middleFolded && ringFolded && pinkyFolded;
}

    
    flipBtn.addEventListener('click', () => {
      facingMode = (facingMode === "user") ? "environment" : "user";
      startCamera();
    });

    startCamera();
  </script>

</body>
</html>
